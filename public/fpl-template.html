<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#666;font-family:'Courier New',monospace;padding:16px}
.btn-bar{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.btn{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 24px;cursor:pointer;border:none;border-radius:2px}
.btn-print{background:#1a1a6e;color:#fff}.btn-print:hover{background:#000d40}
.btn-clear{background:#eee;color:#333;border:1.5px solid #999}.btn-clear:hover{background:#ddd}
.fpl{container-type:inline-size;position:relative;width:100%;max-width:780px;margin:0 auto;display:block;box-shadow:0 6px 32px rgba(0,0,0,.4);background:#fff;}
.fpl img.bg{display:block;width:100%;height:auto;pointer-events:none;user-select:none;vertical-align:top;}
.fpl input[type=text]{position:absolute;background:transparent;border:none;outline:none;font-family:'Courier New',monospace;color:#000;padding:0 3px;display:flex;align-items:center;}
.fpl input[type=text]:focus{background:rgba(0,100,255,.06)}
.fpl textarea{position:absolute;background:transparent;border:none;outline:none;font-family:'Courier New',monospace;color:#000;padding:2px 3px;resize:none;line-height:1.3;}
.fpl textarea:focus{background:rgba(0,100,255,.06)}
.fpl select{position:absolute;background:transparent;border:none;outline:none;font-family:'Courier New',monospace;color:#000;cursor:pointer;-webkit-appearance:none;-moz-appearance:none;appearance:none;padding:0 2px;display:flex;align-items:center;justify-content:center;}
.fpl select:focus{background:rgba(200,225,255,.5);outline:none}
.fpl .sq{position:absolute;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;}
.fpl .sq.on::after{content:'✓';font-size:1.8cqw;color:#000;font-weight:900;}
.fpl .sq:hover{background:rgba(0,100,255,.08)}
@media print{body{background:#fff;padding:0}.btn-bar{display:none}.fpl{box-shadow:none;max-width:100%;page-break-inside:avoid}}
</style>
</head>
