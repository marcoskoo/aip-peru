# ─────────────────────────────────────────────────────────────────
# AIP PERÚ - Netlify Configuration
# ─────────────────────────────────────────────────────────────────

[build]
  command = """
    prisma generate &&
    next build
  """
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"
  # Prisma configuration
  PRISMA_GENERATE_DATAMODEL_PATH = "prisma/schema.prisma"
  # Required: set DATABASE_URL in Netlify UI (Site settings → Environment variables)
  # Required: set NEXTAUTH_URL in Netlify UI (your https://<site>.netlify.app URL)
  # Required: set NEXTAUTH_SECRET in Netlify UI (use `openssl rand -base64 32`)

# Next.js 16 con App Router usa el plugin oficial de Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

  [plugins.inputs]
    # Build Next.js with the plugin's recommended defaults
    # No output: "standalone" - the plugin handles everything

# ── Function configuration ───────────────────────────────────────
# Netlify Functions have a 26s timeout on starter plan, 50MB bundle size
[functions]
  node_bundler = "esbuild"
  # Include Prisma engine binaries if needed
  included_files = ["node_modules/.prisma/**/*", "node_modules/@prisma/client/**/*"]

# ── Headers de seguridad ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ── Cache static assets aggressively ─────────────────────────────
[[headers]]
  for = "/charts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/aip-charts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Note: Next.js plugin handles routing automatically.
# SPA-style fallback is NOT needed — the plugin generates proper redirects.
